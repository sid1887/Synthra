<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Synthra - AI-driven Electronic Design Automation"
    />
    <title>Synthra - The Synthesis Era</title>
    <style>
      /* Critical CSS - Ensures basic layout while styles load */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; width: 100%; }
      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #ffffff;
        color: #212529;
        line-height: 1.5;
        font-size: 14px;
      }
      #root {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }
      /* Prevent layout shift while JS loads */
      noscript { display: none; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
      // Styles are now injected via JavaScript in index.tsx
      console.log('[Synthra] HTML loaded, waiting for React to inject styles');
    </script>
    <script defer src="/static/js/bundle.js"></script>
  </body>
</html>
