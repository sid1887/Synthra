version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: synthra-db
    environment:
      POSTGRES_DB: synthra
      POSTGRES_USER: synthra
      POSTGRES_PASSWORD: synthra_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synthra"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Vision Service - Image processing & ML detection
  vision:
    build:
      context: ./services/vision
      dockerfile: Dockerfile
    container_name: synthra-vision
    volumes:
      - ./services/vision:/app
      - ./models:/models
      - ./shared:/shared
      - uploads:/uploads
    environment:
      - MODEL_PATH=/models/yolov8_circuit.pt
      - UPLOAD_DIR=/uploads
      - SVE_SERVICE_URL=http://sve:8000
    ports:
      - "8001:8000"
    depends_on:
      - db
      - sve
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Core Service - Netlist & HDL generation
  core:
    build:
      context: ./services/core
      dockerfile: Dockerfile
    container_name: synthra-core
    volumes:
      - ./services/core:/app
      - ./shared:/shared
    environment:
      - DATABASE_URL=postgresql://synthra:synthra_dev_password@db:5432/synthra
    ports:
      - "8002:8000"
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Simulator Service - ngspice & Verilator
  simulator:
    build:
      context: ./services/simulator
      dockerfile: Dockerfile
    container_name: synthra-simulator
    volumes:
      - ./services/simulator:/app
      - ./shared:/shared
      - simulations:/simulations
    environment:
      - SIMULATION_DIR=/simulations
      - NGSPICE_PATH=/usr/bin/ngspice
    ports:
      - "8003:8000"
    depends_on:
      - core
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Docs Service - PDF generation
  docs:
    build:
      context: ./services/docs
      dockerfile: Dockerfile
    container_name: synthra-docs
    volumes:
      - ./services/docs:/app
      - ./shared:/shared
      - reports:/reports
    environment:
      - REPORT_DIR=/reports
      - LATEX_PATH=/usr/bin/pdflatex
    ports:
      - "8004:8000"
    depends_on:
      - simulator
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SVE Service - AI-powered component symbol generation
  sve:
    build:
      context: ./services/sve
      dockerfile: Dockerfile
    container_name: synthra-sve
    volumes:
      - ./services/sve:/app
      - ./shared:/shared
      - ./models/weights:/models
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - DATABASE_URL=postgresql://synthra:synthra_dev_password@db:5432/synthra
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - TORCH_HOME=/root/.cache/torch
    ports:
      - "8005:8000"
    depends_on:
      - db
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Real-Time Service - WebSocket collaboration
  realtime:
    build:
      context: ./services/realtime
      dockerfile: Dockerfile
    container_name: synthra-realtime
    volumes:
      - ./services/realtime:/app
      - ./shared:/shared
    environment:
      - REDIS_URL=redis://redis:6379
      - CORE_SERVICE_URL=http://core:8000
    ports:
      - "8006:8000"
    depends_on:
      - redis
      - core
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway - FastAPI orchestrator
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: synthra-api
    volumes:
      - ./services/api:/app
      - ./shared:/shared
    environment:
      - DATABASE_URL=postgresql://synthra:synthra_dev_password@db:5432/synthra
      - VISION_SERVICE_URL=http://vision:8000
      - CORE_SERVICE_URL=http://core:8000
      - SIMULATOR_SERVICE_URL=http://simulator:8000
      - DOCS_SERVICE_URL=http://docs:8000
      - SVE_SERVICE_URL=http://sve:8000
      - REALTIME_SERVICE_URL=http://realtime:8000
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - vision
      - core
      - simulator
      - docs
      - sve
      - realtime
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis - Job queue & caching
  redis:
    image: redis:7-alpine
    container_name: synthra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend - React app
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: synthra-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    stdin_open: true

volumes:
  postgres_data:
  redis_data:
  uploads:
  simulations:
  reports:
  huggingface_cache:

networks:
  default:
    name: synthra-network
